<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flopibet Signup</title>
    <link rel="icon" type="image/png" href="assets/flopibet-tab.png">
    <link rel="apple-touch-icon" href="assets/flopibet-tab.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0a0e1a',
                        'brand-card': '#141828',
                        'brand-surface': '#1c2140',
                        'brand-border': '#2a2f4a',
                        'brand-accent': '#6c5ce7',
                        'brand-accent-light': '#a29bfe',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site.css">
</head>
<body class="bg-brand-dark min-h-screen font-sans text-white flex items-center justify-center p-4">

    <div class="wallet-card relative rounded-3xl overflow-hidden border border-brand-border/40 bg-brand-card p-8 sm:p-12 w-full max-w-md shadow-2xl">
        <div class="pattern-overlay absolute inset-0 pointer-events-none opacity-[0.04]"></div>
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-brand-accent/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="relative z-10 text-center mb-8">
            <div class="w-16 h-16 rounded-full overflow-hidden bg-[#14243a] flex items-center justify-center mx-auto mb-4 shadow-lg shadow-black/30 ring-4 ring-white/10">
                <img src="assets/flopibet%20logo.png" alt="Flopibet logo" class="w-full h-full object-cover" />
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Create Account</h1>
            <p class="text-gray-400 text-sm">Join Flopibet today.</p>
        </div>

        <!-- Step 1: Signup Form -->
        <form id="signup-form" class="relative z-10 space-y-5">
            <div id="signup-error" class="hidden text-sm text-red-400 text-center bg-red-400/10 p-3 rounded-lg border border-red-400/20"></div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1" for="email">Email Address</label>
                <input type="email" id="email" required class="w-full bg-brand-surface/50 border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-colors placeholder-gray-500" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1" for="password">Password</label>
                <div class="relative">
                    <input type="password" id="password" required class="w-full bg-brand-surface/50 border border-brand-border rounded-xl px-4 py-3 pr-12 text-white focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-colors placeholder-gray-500" placeholder="••••••••">
                    <button type="button" class="password-toggle-btn absolute inset-y-0 right-0 flex items-center justify-center px-4 text-gray-400 hover:text-white transition-colors" data-target="password" aria-label="Show password" aria-pressed="false">
                        <svg class="password-toggle-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1" for="referred_by_code">Referral Code (Optional)</label>
                <input type="text" id="referred_by_code" class="w-full bg-brand-surface/50 border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-colors placeholder-gray-500 uppercase" placeholder="e.g. ABC123DEF">
            </div>
            <button type="submit" id="btn-signup" class="w-full bg-brand-accent hover:bg-brand-accent-light text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-brand-accent/30 transition-all duration-300 mt-4 flex justify-center items-center gap-2">
                Sign Up
            </button>
            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account? <a href="login.html" class="text-brand-accent-light hover:underline font-medium">Log in</a>
            </p>
        </form>

        <!-- Step 2: OTP Form (Hidden initially) -->
        <form id="otp-form" class="relative z-10 space-y-5 hidden">
            <p class="text-sm text-gray-300 text-center bg-brand-surface/40 p-3 rounded-lg border border-brand-border">
                We've sent a 6-digit verification code to your email.
            </p>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1" for="otp">Verification Code</label>
                <input type="text" id="otp" required maxlength="6" class="w-full bg-brand-surface/50 border border-brand-border rounded-xl px-4 py-3 text-white text-center tracking-widest font-bold text-xl focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-colors" placeholder="000000">
            </div>
            <button type="submit" id="btn-verify" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all duration-300 mt-4">
                Verify Email
            </button>
            <button type="button" id="btn-back" class="w-full bg-transparent text-gray-400 hover:text-white py-2 text-sm font-medium transition-colors">
                Back to Sign Up
            </button>
        </form>
    </div>

    <script src="site-auth.js"></script>
</body>
</html>
