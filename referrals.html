<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral</title>
    <link rel="icon" type="image/png" href="assets/flopibet-tab.png">
    <link rel="apple-touch-icon" href="assets/flopibet-tab.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0a0e1a',
                        'brand-card': '#141828',
                        'brand-surface': '#1c2140',
                        'brand-border': '#2a2f4a',
                        'brand-accent': '#6c5ce7',
                        'brand-accent-light': '#a29bfe',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site.css">
</head>
<body class="bg-brand-dark min-h-screen font-sans text-white overflow-x-hidden">

    <!-- ═══════════ NAVIGATION BAR ═══════════ -->
    <nav id="main-nav" class="w-full bg-brand-dark/80 backdrop-blur-xl border-b border-brand-border/40 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden bg-[#14243a] flex items-center justify-center shadow-lg shadow-black/30 ring-2 ring-white/10">
                    <img src="assets/flopibet%20logo.png" alt="Flopibet logo" class="w-full h-full object-cover" />
                </div>
                <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Flopibet</span>
            </div>

            <div class="hidden md:flex items-center gap-1">
                <a href="wallet.html" class="nav-link relative px-5 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white transition-all duration-300">Wallet</a>
                <a href="history.html" class="nav-link relative px-5 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white transition-all duration-300">History</a>
                <a href="referrals.html" class="nav-link active relative px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300">Referrals</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="siteLogout()" class="text-sm font-medium text-brand-accent-light hover:text-white transition-colors">Logout</button>
                
                <!-- Mobile menu button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-400 hover:text-white transition-colors" aria-label="Toggle mobile menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden border-t border-brand-border/40 bg-brand-dark/95 backdrop-blur-xl">
            <div class="px-4 py-3 space-y-1">
                <a href="wallet.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-brand-surface/50 transition-colors">Wallet</a>
                <a href="history.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-brand-surface/50 transition-colors">History</a>
                <a href="referrals.html" class="block px-4 py-2.5 rounded-lg text-sm font-semibold text-brand-accent-light bg-brand-accent/10">Referrals</a>
            </div>
        </div>
    </nav>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        
        <div class="wallet-card relative rounded-3xl overflow-hidden border border-brand-border/40 bg-brand-card p-8 sm:p-12 text-center">
            <div class="pattern-overlay absolute inset-0 pointer-events-none opacity-[0.04]"></div>
            
            <div class="relative z-10">
                <div class="w-20 h-20 mx-auto bg-brand-accent/20 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-brand-accent-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </div>

                <h1 class="text-3xl font-bold mb-4">Invite Friends & Earn</h1>
                <p class="text-gray-400 mb-8 max-w-lg mx-auto">Share your unique referral code with friends. When they sign up and make a deposit, you both receive a bonus!</p>

                <div class="bg-brand-surface/80 border border-brand-border/50 rounded-2xl p-6 max-w-md mx-auto">
                    <p class="text-xs uppercase tracking-widest text-gray-500 font-bold mb-2">Your Referral Code</p>
                    <div class="flex items-center justify-between bg-brand-dark rounded-xl border border-brand-border p-2 pl-4">
                        <span id="ref-code-display" class="font-mono text-xl tracking-wider text-brand-accent-light font-bold">LOADING...</span>
                        <button onclick="copyCode()" class="bg-brand-accent hover:bg-brand-accent-light text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Copy</button>
                    </div>
                </div>

                <div class="bg-brand-surface/80 border border-brand-border/50 rounded-2xl p-6 max-w-md mx-auto mt-6">
                    <p class="text-xs uppercase tracking-widest text-gray-500 font-bold mb-2">Total Successful Referrals</p>
                    <div class="flex items-center justify-center bg-brand-dark rounded-xl border border-brand-border p-4">
                        <span id="referrals-count-display" class="font-mono text-4xl text-emerald-400 font-bold">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="site-auth.js"></script>
    <script src="wallet.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const code = localStorage.getItem("referral_code");
            if(code) {
                document.getElementById("ref-code-display").textContent = code;
            } else {
                document.getElementById("ref-code-display").textContent = "NO-CODE-FOUND";
            }
        });

        function copyCode() {
            const code = document.getElementById("ref-code-display").textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast("Referral code copied to clipboard!");
            });
        }
    </script>
</body>
</html>
