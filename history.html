<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0a0e1a',
                        'brand-card': '#141828',
                        'brand-surface': '#1c2140',
                        'brand-border': '#2a2f4a',
                        'brand-accent': '#6c5ce7',
                        'brand-accent-light': '#a29bfe',
                        'trx-red': '#ff0013',
                        'usdt-green': '#26a17b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site.css">
</head>
<body class="bg-brand-dark min-h-screen font-sans text-white overflow-x-hidden">

    <!-- ═══════════ NAVIGATION BAR ═══════════ -->
    <nav id="main-nav" class="w-full bg-brand-dark/80 backdrop-blur-xl border-b border-brand-border/40 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden bg-[#14243a] flex items-center justify-center shadow-lg shadow-black/30 ring-2 ring-white/10">
                    <img src="assets/flopibet%20logo.png" alt="Flopibet logo" class="w-full h-full object-cover" />
                </div>
                <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Flopibet</span>
            </div>

            <div class="hidden md:flex items-center gap-1">
                <a href="wallet.html" class="nav-link relative px-5 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white transition-all duration-300">Wallet</a>
                <a href="history.html" class="nav-link active relative px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300">History</a>
                <a href="referrals.html" class="nav-link relative px-5 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white transition-all duration-300">Referrals</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="siteLogout()" class="text-sm font-medium text-brand-accent-light hover:text-white transition-colors">Logout</button>
                
                <!-- Mobile menu button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-400 hover:text-white transition-colors" aria-label="Toggle mobile menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden border-t border-brand-border/40 bg-brand-dark/95 backdrop-blur-xl">
            <div class="px-4 py-3 space-y-1">
                <a href="wallet.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-brand-surface/50 transition-colors">Wallet</a>
                <a href="history.html" class="block px-4 py-2.5 rounded-lg text-sm font-semibold text-brand-accent-light bg-brand-accent/10">History</a>
                <a href="referrals.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-brand-surface/50 transition-colors">Referrals</a>
            </div>
        </div>
    </nav>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        
        <h1 class="text-3xl font-bold mb-8">Transaction History</h1>

        <div id="history-container" class="space-y-6">
            <!-- Loading State -->
            <div class="flex justify-center py-8">
                <svg class="animate-spin h-8 w-8 text-brand-accent-light" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </div>
        </div>
    </main>

    <script src="site-auth.js"></script>
    <script src="wallet.js"></script>
</body>
</html>
